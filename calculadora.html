<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora</title>
  <style>
    :root {
      --bg: #1a1d23;
      --surface: #252932;
      --display: #0d0f12;
      --text: #e8eaed;
      --muted: #9aa0a6;
      --accent: #5c9eff;
      --accent-hover: #7eb3ff;
      --op: #3d4450;
      --op-hover: #4a5260;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: radial-gradient(ellipse at top, #2a3140 0%, var(--bg) 55%);
      color: var(--text);
    }

    .calculadora {
      width: min(100% - 2rem, 320px);
      padding: 1.25rem;
      background: var(--surface);
      border-radius: 16px;
      box-shadow:
        0 24px 48px rgba(0, 0, 0, 0.45),
        0 0 0 1px rgba(255, 255, 255, 0.06);
    }

    .calculadora h1 {
      margin: 0 0 1rem;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
    }

    .display {
      width: 100%;
      min-height: 3.25rem;
      padding: 0.65rem 1rem;
      margin-bottom: 1rem;
      background: var(--display);
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      font-size: 1.75rem;
      font-variant-numeric: tabular-nums;
      text-align: right;
      word-break: break-all;
      line-height: 1.3;
    }

    .teclado {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.5rem;
    }

    .teclado button {
      min-height: 52px;
      border: none;
      border-radius: 10px;
      font-size: 1.15rem;
      font-weight: 500;
      cursor: pointer;
      color: var(--text);
      background: #363c48;
      transition: background 0.12s ease, transform 0.08s ease;
    }

    .teclado button:hover {
      background: #424a58;
    }

    .teclado button:active {
      transform: scale(0.97);
    }

    .teclado button.op {
      background: var(--op);
      color: var(--accent);
      font-size: 1.35rem;
    }

    .teclado button.op:hover {
      background: var(--op-hover);
    }

    .teclado button.igual {
      background: var(--accent);
      color: #0d1117;
      font-weight: 600;
    }

    .teclado button.igual:hover {
      background: var(--accent-hover);
    }

    .teclado button.limpar {
      background: #4a3540;
      color: #f0a8b8;
    }

    .teclado button.limpar:hover {
      background: #5c4250;
    }
  </style>
</head>
<body>
  <div class="calculadora" role="application" aria-label="Calculadora">
    <h1>Calculadora</h1>
    <div class="display" id="display" aria-live="polite">0</div>
    <div class="teclado">
      <button type="button" data-num="7">7</button>
      <button type="button" data-num="8">8</button>
      <button type="button" data-num="9">9</button>
      <button type="button" class="op" data-op="divide" aria-label="Dividir">÷</button>

      <button type="button" data-num="4">4</button>
      <button type="button" data-num="5">5</button>
      <button type="button" data-num="6">6</button>
      <button type="button" class="op" data-op="multiply" aria-label="Multiplicar">×</button>

      <button type="button" data-num="1">1</button>
      <button type="button" data-num="2">2</button>
      <button type="button" data-num="3">3</button>
      <button type="button" class="op" data-op="subtract" aria-label="Subtrair">−</button>

      <button type="button" data-num="0">0</button>
      <button type="button" class="limpar" data-ac="clear" aria-label="Limpar">C</button>
      <button type="button" class="igual" data-eq="equals" aria-label="Igual">=</button>
      <button type="button" class="op" data-op="add" aria-label="Somar">+</button>
    </div>
  </div>

  <script>
    (function () {
      const display = document.getElementById("display");
      let current = "0";
      let stored = null;
      let pendingOp = null;
      let fresh = true;

      function updateDisplay() {
        display.textContent = current;
      }

      function inputDigit(d) {
        if (fresh || current === "0") {
          current = d;
          fresh = false;
        } else {
          current += d;
        }
        updateDisplay();
      }

      function clearAll() {
        current = "0";
        stored = null;
        pendingOp = null;
        fresh = true;
        updateDisplay();
      }

      function applyOp(op, a, b) {
        const x = parseFloat(a);
        const y = parseFloat(b);
        switch (op) {
          case "add":
            return x + y;
          case "subtract":
            return x - y;
          case "multiply":
            return x * y;
          case "divide":
            return y === 0 ? NaN : x / y;
          default:
            return y;
        }
      }

      function commitPending() {
        if (stored !== null && pendingOp !== null && !fresh) {
          const result = applyOp(pendingOp, stored, current);
          if (Number.isNaN(result) || !Number.isFinite(result)) {
            current = "Erro";
          } else {
            current = String(
              Math.abs(result) < 1e15 && Number.isInteger(result)
                ? result
                : parseFloat(result.toPrecision(12))
            );
          }
          stored = null;
          pendingOp = null;
          fresh = true;
          updateDisplay();
          return true;
        }
        return false;
      }

      function setOperation(op) {
        if (stored !== null && pendingOp !== null && !fresh) {
          commitPending();
          if (current === "Erro") return;
        }
        stored = current;
        pendingOp = op;
        fresh = true;
      }

      document.querySelector(".teclado").addEventListener("click", function (e) {
        const btn = e.target.closest("button");
        if (!btn) return;

        if (btn.dataset.num !== undefined) {
          if (current === "Erro") clearAll();
          inputDigit(btn.dataset.num);
          return;
        }

        if (btn.dataset.op) {
          if (current === "Erro") return;
          setOperation(btn.dataset.op);
          return;
        }

        if (btn.dataset.eq) {
          commitPending();
          return;
        }

        if (btn.dataset.ac === "clear") {
          clearAll();
        }
      });
    })();
  </script>
</body>
</html>
